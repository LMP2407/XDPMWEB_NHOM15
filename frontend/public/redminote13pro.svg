<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#F4EEF9"/>
  <!-- subtle grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#6C3483" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#grid)"/>
  <!-- phone body -->
  <rect x="130" y="60" width="140" height="240" rx="20" ry="20" fill="#6C3483" opacity="0.15"/>
  <rect x="135" y="65" width="130" height="230" rx="17" ry="17" fill="#0D0D0D" opacity="0.85"/>
  <!-- screen -->
  <rect x="143" y="85" width="114" height="185" rx="8" ry="8" fill="#F4EEF9" opacity="0.9"/>
  <!-- screen glow -->
  <rect x="143" y="85" width="114" height="185" rx="8" ry="8" fill="#6C3483" opacity="0.1"/>
  <!-- dynamic island / notch -->
  <rect x="178" y="72" width="44" height="10" rx="5" ry="5" fill="#F4EEF9" opacity="0.8"/>
  <!-- camera bump -->
  <rect x="155" y="90" width="40" height="40" rx="8" ry="8" fill="#6C3483" opacity="0.25"/>
  <circle cx="168" cy="103" r="8" fill="#0D0D0D" opacity="0.7"/>
  <circle cx="183" cy="118" r="8" fill="#0D0D0D" opacity="0.7"/>
  <circle cx="168" cy="103" r="5" fill="#6C3483" opacity="0.6"/>
  <circle cx="183" cy="118" r="5" fill="#6C3483" opacity="0.6"/>
  <!-- side buttons -->
  <rect x="127" y="120" width="4" height="25" rx="2" fill="#6C3483" opacity="0.6"/>
  <rect x="127" y="155" width="4" height="35" rx="2" fill="#6C3483" opacity="0.6"/>
  <rect x="269" y="130" width="4" height="40" rx="2" fill="#6C3483" opacity="0.6"/>
  <!-- brand accent line -->
  <line x1="60" y1="340" x2="340" y2="340" stroke="#6C3483" stroke-width="2" opacity="0.4"/>
  <!-- text -->
  <text x="200" y="368" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#0D0D0D" text-anchor="middle" opacity="0.8">Redmi Note</text>
  <text x="200" y="386" font-family="Georgia, serif" font-size="13" fill="#0D0D0D" text-anchor="middle" opacity="0.6">13 Pro+</text>
</svg>