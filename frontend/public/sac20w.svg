<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#F5F5F5"/>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#C8C8C8" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#grid)"/>
  <!-- charger body -->
  <rect x="150" y="100" width="100" height="130" rx="15" ry="15" fill="#C8C8C8" opacity="0.25"/>
  <rect x="153" y="103" width="94" height="124" rx="13" ry="13" fill="#333333" opacity="0.85"/>
  <!-- prongs -->
  <rect x="181" y="225" width="12" height="30" rx="4" fill="#333333" opacity="0.9"/>
  <rect x="207" y="225" width="12" height="30" rx="4" fill="#333333" opacity="0.9"/>
  <!-- USB-C port -->
  <rect x="183" y="103" width="34" height="8" rx="4" fill="#F5F5F5" opacity="0.7"/>
  <!-- brand logo area -->
  <circle cx="200" cy="165" r="20" fill="#C8C8C8" opacity="0.2"/>
  <text x="200" y="170" font-family="Arial" font-size="11" fill="#333333" text-anchor="middle" opacity="0.6">20W</text>
  <line x1="60" y1="300" x2="340" y2="300" stroke="#C8C8C8" stroke-width="2" opacity="0.4"/>
  <text x="200" y="328" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#333333" text-anchor="middle" opacity="0.8">Sạc nhanh</text>
  <text x="200" y="346" font-family="Georgia, serif" font-size="13" fill="#333333" text-anchor="middle" opacity="0.6">20W</text>
</svg>