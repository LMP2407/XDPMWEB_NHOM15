<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#F8F8F8"/>
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#A0A0A0" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#grid)"/>
  <!-- case -->
  <rect x="140" y="100" width="120" height="160" rx="30" ry="30" fill="#A0A0A0" opacity="0.2"/>
  <rect x="143" y="103" width="114" height="154" rx="28" ry="28" fill="#1C1C1E" opacity="0.85"/>
  <!-- lid line -->
  <line x1="143" y1="175" x2="257" y2="175" stroke="#F8F8F8" stroke-width="2" opacity="0.5"/>
  <!-- hinge -->
  <rect x="193" y="170" width="14" height="10" rx="3" fill="#A0A0A0" opacity="0.5"/>
  <!-- earbuds inside -->
  <ellipse cx="175" cy="145" rx="16" ry="22" fill="#A0A0A0" opacity="0.3"/>
  <ellipse cx="225" cy="145" rx="16" ry="22" fill="#A0A0A0" opacity="0.3"/>
  <!-- LED -->
  <circle cx="200" cy="220" r="4" fill="#A0A0A0" opacity="0.7"/>
  <line x1="60" y1="310" x2="340" y2="310" stroke="#A0A0A0" stroke-width="2" opacity="0.4"/>
  <text x="200" y="338" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#1C1C1E" text-anchor="middle" opacity="0.8">AirPods</text>
  <text x="200" y="356" font-family="Georgia, serif" font-size="13" fill="#1C1C1E" text-anchor="middle" opacity="0.6">Pro 2</text>
</svg>